name: Publish @sentinos/node (npm)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@latest
          npm --version
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
      - name: Provenance readiness
        run: npm run provenance:check
      - name: Publish to npm
        run: npm publish --access public
